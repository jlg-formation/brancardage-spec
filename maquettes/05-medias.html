<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Écran - Médias</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body class="bg-gray-200 flex items-center justify-center min-h-screen">
    <!-- Cadre du téléphone -->
    <div
      class="w-[336px] h-[584px] bg-black rounded-[2rem] p-2 shadow-2xl relative"
    >
      <!-- Écran interne (320x568) -->
      <div
        class="w-[320px] h-[568px] bg-gray-50 rounded-[1.5rem] overflow-hidden relative flex flex-col"
      >
        <!-- Header -->
        <div
          class="bg-blue-600 text-white px-4 py-4 flex items-center justify-between shadow-md z-10"
        >
          <div class="flex items-center gap-3">
            <a
              href="04-dossier-patient.html"
              class="p-1 hover:bg-blue-700 rounded-full transition"
            >
              <svg
                class="w-6 h-6"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M10 19l-7-7m0 0l7-7m-7 7h18"
                ></path>
              </svg>
            </a>
            <h1 class="text-lg font-semibold">Médias (Optionnel)</h1>
          </div>
          <a
            href="06-localisation.html"
            class="text-sm font-medium text-blue-100 hover:text-white transition"
            >Passer</a
          >
        </div>

        <!-- Contenu de l'écran -->
        <div class="flex-1 overflow-y-auto p-4 flex flex-col">
          <div class="mb-6">
            <h2 class="text-lg font-bold text-gray-900">
              Ajouter des informations visuelles
            </h2>
            <p class="text-sm text-gray-500 mt-1">
              Aidez le brancardier en ajoutant des photos de l'équipement ou des
              documents médicaux.
            </p>
          </div>

          <!-- Actions d'ajout -->
          <div class="grid grid-cols-2 gap-3 mb-6">
            <button
              class="bg-white border-2 border-dashed border-blue-300 rounded-xl p-4 flex flex-col items-center justify-center gap-2 hover:bg-blue-50 hover:border-blue-500 transition group"
            >
              <div
                class="w-10 h-10 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center group-hover:bg-blue-600 group-hover:text-white transition"
              >
                <svg
                  class="w-5 h-5"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"
                  ></path>
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"
                  ></path>
                </svg>
              </div>
              <span class="text-xs font-medium text-gray-700 text-center"
                >Prendre une photo</span
              >
            </button>

            <button
              class="bg-white border-2 border-dashed border-blue-300 rounded-xl p-4 flex flex-col items-center justify-center gap-2 hover:bg-blue-50 hover:border-blue-500 transition group"
            >
              <div
                class="w-10 h-10 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center group-hover:bg-blue-600 group-hover:text-white transition"
              >
                <svg
                  class="w-5 h-5"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
                  ></path>
                </svg>
              </div>
              <span class="text-xs font-medium text-gray-700 text-center"
                >Scanner un document</span
              >
            </button>
          </div>

          <!-- Liste des médias ajoutés (Simulation) -->
          <div class="space-y-3">
            <h3 class="text-sm font-semibold text-gray-900">
              Médias joints (1)
            </h3>

            <div
              class="bg-white rounded-xl p-3 shadow-sm border border-gray-100 flex items-center justify-between"
            >
              <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-gray-200 rounded-lg overflow-hidden">
                  <img
                    src="https://images.unsplash.com/photo-1584982751601-97dcc096659c?ixlib=rb-4.0.3&auto=format&fit=crop&w=100&q=80"
                    alt="Potence"
                    class="w-full h-full object-cover"
                  />
                </div>
                <div>
                  <p class="text-sm font-medium text-gray-900">
                    Potence à sérum
                  </p>
                  <p class="text-xs text-gray-500">Photo • 1.2 Mo</p>
                </div>
              </div>
              <button
                class="p-2 text-red-500 hover:bg-red-50 rounded-full transition"
              >
                <svg
                  class="w-5 h-5"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                  ></path>
                </svg>
              </button>
            </div>
          </div>

          <!-- Bouton d'action -->
          <div class="mt-auto pt-6">
            <a
              href="06-localisation.html"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl shadow-md transition duration-200 flex justify-center items-center gap-2"
            >
              Continuer
              <svg
                class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M14 5l7 7m0 0l-7 7m7-7H3"
                ></path>
              </svg>
            </a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
