<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Écran - Destination</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body class="bg-gray-200 flex items-center justify-center min-h-screen">
    <!-- Cadre du téléphone -->
    <div
      class="w-[336px] h-[584px] bg-black rounded-[2rem] p-2 shadow-2xl relative"
    >
      <!-- Écran interne (320x568) -->
      <div
        class="w-[320px] h-[568px] bg-gray-50 rounded-[1.5rem] overflow-hidden relative flex flex-col"
      >
        <!-- Header -->
        <div
          class="bg-blue-600 text-white px-4 py-4 flex items-center gap-3 shadow-md z-10"
        >
          <a
            href="06-localisation.html"
            class="p-1 hover:bg-blue-700 rounded-full transition"
          >
            <svg
              class="w-6 h-6"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M10 19l-7-7m0 0l7-7m-7 7h18"
              ></path>
            </svg>
          </a>
          <h1 class="text-lg font-semibold">Destination</h1>
        </div>

        <!-- Contenu de l'écran -->
        <div class="flex-1 overflow-y-auto p-4 flex flex-col">
          <div class="mb-6">
            <h2 class="text-lg font-bold text-gray-900">Où va le patient ?</h2>
            <p class="text-sm text-gray-500 mt-1">
              Sélectionnez le service ou la chambre d'arrivée.
            </p>
          </div>

          <!-- Recherche -->
          <div class="relative mb-6">
            <div
              class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
            >
              <svg
                class="h-5 w-5 text-gray-400"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
                ></path>
              </svg>
            </div>
            <input
              type="text"
              placeholder="Rechercher un service..."
              class="w-full border border-gray-300 rounded-xl pl-10 pr-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
            />
          </div>

          <!-- Liste des destinations fréquentes -->
          <div class="space-y-3">
            <h3 class="text-sm font-semibold text-gray-900">
              Destinations fréquentes
            </h3>

            <!-- Option 1 -->
            <label
              class="flex items-center justify-between p-4 bg-white border-2 border-transparent rounded-xl shadow-sm hover:border-blue-500 hover:bg-blue-50 transition cursor-pointer group"
            >
              <div class="flex items-center gap-3">
                <div
                  class="w-10 h-10 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center group-hover:bg-blue-600 group-hover:text-white transition"
                >
                  <svg
                    class="w-5 h-5"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"
                    ></path>
                  </svg>
                </div>
                <div>
                  <h4 class="font-semibold text-gray-900">Radiologie</h4>
                  <p class="text-xs text-gray-500">Bâtiment B - RDC</p>
                </div>
              </div>
              <input
                type="radio"
                name="destination"
                class="w-5 h-5 text-blue-600 focus:ring-blue-500 border-gray-300"
              />
            </label>

            <!-- Option 2 -->
            <label
              class="flex items-center justify-between p-4 bg-white border-2 border-transparent rounded-xl shadow-sm hover:border-blue-500 hover:bg-blue-50 transition cursor-pointer group"
            >
              <div class="flex items-center gap-3">
                <div
                  class="w-10 h-10 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center group-hover:bg-blue-600 group-hover:text-white transition"
                >
                  <svg
                    class="w-5 h-5"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"
                    ></path>
                  </svg>
                </div>
                <div>
                  <h4 class="font-semibold text-gray-900">Bloc Opératoire</h4>
                  <p class="text-xs text-gray-500">Bâtiment A - Étage 1</p>
                </div>
              </div>
              <input
                type="radio"
                name="destination"
                class="w-5 h-5 text-blue-600 focus:ring-blue-500 border-gray-300"
                checked
              />
            </label>

            <!-- Option 3 -->
            <label
              class="flex items-center justify-between p-4 bg-white border-2 border-transparent rounded-xl shadow-sm hover:border-blue-500 hover:bg-blue-50 transition cursor-pointer group"
            >
              <div class="flex items-center gap-3">
                <div
                  class="w-10 h-10 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center group-hover:bg-blue-600 group-hover:text-white transition"
                >
                  <svg
                    class="w-5 h-5"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"
                    ></path>
                  </svg>
                </div>
                <div>
                  <h4 class="font-semibold text-gray-900">Urgences</h4>
                  <p class="text-xs text-gray-500">Bâtiment C - RDC</p>
                </div>
              </div>
              <input
                type="radio"
                name="destination"
                class="w-5 h-5 text-blue-600 focus:ring-blue-500 border-gray-300"
              />
            </label>
          </div>

          <!-- Bouton d'action -->
          <div class="mt-auto pt-6">
            <a
              href="08-recapitulatif.html"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl shadow-md transition duration-200 flex justify-center items-center gap-2"
            >
              Continuer
              <svg
                class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M14 5l7 7m0 0l-7 7m7-7H3"
                ></path>
              </svg>
            </a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
