<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Écran - Recherche Manuelle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body class="bg-gray-200 flex items-center justify-center min-h-screen">
    <!-- Cadre du téléphone -->
    <div
      class="w-[336px] h-[584px] bg-black rounded-[2rem] p-2 shadow-2xl relative"
    >
      <!-- Écran interne (320x568) -->
      <div
        class="w-[320px] h-[568px] bg-gray-50 rounded-[1.5rem] overflow-hidden relative flex flex-col"
      >
        <!-- Header -->
        <div
          class="bg-blue-600 text-white px-4 py-4 flex items-center gap-3 shadow-md z-10"
        >
          <a
            href="01-accueil.html"
            class="p-1 hover:bg-blue-700 rounded-full transition"
          >
            <svg
              class="w-6 h-6"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M10 19l-7-7m0 0l7-7m-7 7h18"
              ></path>
            </svg>
          </a>
          <h1 class="text-lg font-semibold">Recherche patient</h1>
        </div>

        <!-- Contenu de l'écran -->
        <div class="flex-1 overflow-y-auto p-4 flex flex-col">
          <p class="text-sm text-gray-600 mb-6">
            Saisissez au moins un critère pour identifier le patient.
          </p>

          <form class="space-y-4 flex-1 flex flex-col">
            <!-- Nom -->
            <div class="flex flex-col gap-1">
              <label class="text-xs font-medium text-gray-700">Nom</label>
              <input
                type="text"
                placeholder="Ex: Dupont"
                class="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
              />
            </div>

            <!-- Prénom -->
            <div class="flex flex-col gap-1">
              <label class="text-xs font-medium text-gray-700">Prénom</label>
              <input
                type="text"
                placeholder="Ex: Jean"
                class="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
              />
            </div>

            <div class="relative flex py-2 items-center">
              <div class="flex-grow border-t border-gray-300"></div>
              <span
                class="flex-shrink-0 mx-4 text-gray-400 text-xs font-medium uppercase"
                >OU</span
              >
              <div class="flex-grow border-t border-gray-300"></div>
            </div>

            <!-- IPP -->
            <div class="flex flex-col gap-1">
              <label class="text-xs font-medium text-gray-700"
                >Numéro de patient (IPP)</label
              >
              <input
                type="number"
                placeholder="Ex: 123456789"
                class="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
              />
            </div>

            <!-- Numéro de sécu -->
            <div class="flex flex-col gap-1">
              <label class="text-xs font-medium text-gray-700"
                >Numéro de sécurité sociale</label
              >
              <input
                type="number"
                placeholder="Ex: 1 80 05 75..."
                class="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
              />
            </div>

            <!-- Bouton de recherche -->
            <div class="mt-auto pt-6">
              <a
                href="04-dossier-patient.html"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl shadow-md transition duration-200 flex justify-center items-center gap-2"
              >
                <svg
                  class="w-5 h-5"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
                  ></path>
                </svg>
                Rechercher
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
