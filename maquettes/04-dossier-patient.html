<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Écran - Dossier Patient</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body class="bg-gray-200 flex items-center justify-center min-h-screen">
    <!-- Cadre du téléphone -->
    <div
      class="w-[336px] h-[584px] bg-black rounded-[2rem] p-2 shadow-2xl relative"
    >
      <!-- Écran interne (320x568) -->
      <div
        class="w-[320px] h-[568px] bg-gray-50 rounded-[1.5rem] overflow-hidden relative flex flex-col"
      >
        <!-- Header -->
        <div
          class="bg-blue-600 text-white px-4 py-4 flex items-center gap-3 shadow-md z-10"
        >
          <a
            href="01-accueil.html"
            class="p-1 hover:bg-blue-700 rounded-full transition"
          >
            <svg
              class="w-6 h-6"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M10 19l-7-7m0 0l7-7m-7 7h18"
              ></path>
            </svg>
          </a>
          <h1 class="text-lg font-semibold">Dossier Patient</h1>
        </div>

        <!-- Contenu de l'écran -->
        <div class="flex-1 overflow-y-auto p-4 flex flex-col">
          <!-- Carte Patient -->
          <div
            class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 mb-6"
          >
            <div class="flex items-center gap-4 mb-4">
              <div
                class="w-14 h-14 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold text-2xl"
              >
                JD
              </div>
              <div>
                <h2 class="font-bold text-xl text-gray-900">Jean Dupont</h2>
                <p class="text-sm text-gray-500">Homme, 42 ans</p>
              </div>
            </div>

            <div class="space-y-3 border-t border-gray-100 pt-4">
              <div class="flex justify-between">
                <span class="text-sm text-gray-500">IPP</span>
                <span class="text-sm font-medium text-gray-900">123456789</span>
              </div>
              <div class="flex justify-between">
                <span class="text-sm text-gray-500">Né(e) le</span>
                <span class="text-sm font-medium text-gray-900"
                  >12/05/1980</span
                >
              </div>
              <div class="flex justify-between">
                <span class="text-sm text-gray-500">Chambre</span>
                <span class="text-sm font-medium text-gray-900"
                  >Cardiologie - 204</span
                >
              </div>
            </div>
          </div>

          <!-- Alertes médicales (Optionnel) -->
          <div
            class="bg-red-50 border border-red-100 rounded-xl p-3 mb-6 flex items-start gap-3"
          >
            <svg
              class="w-5 h-5 text-red-500 mt-0.5 flex-shrink-0"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
              ></path>
            </svg>
            <div>
              <h3 class="text-sm font-semibold text-red-800">Précautions</h3>
              <p class="text-xs text-red-600 mt-1">
                Patient sous perfusion. Nécessite une potence à sérum.
              </p>
            </div>
          </div>

          <!-- Bouton d'action -->
          <div class="mt-auto pt-4">
            <a
              href="05-medias.html"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl shadow-md transition duration-200 flex justify-center items-center gap-2"
            >
              Créer une demande
              <svg
                class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M14 5l7 7m0 0l-7 7m7-7H3"
                ></path>
              </svg>
            </a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
